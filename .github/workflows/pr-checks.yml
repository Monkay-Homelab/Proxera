name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-checks:
    name: Go Checks
    runs-on: ubuntu-latest
    env:
      GOWORK: ${{ github.workspace }}/go.work
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: |
            backend/go.sum
            agent/go.sum

      - name: Vet backend
        run: go vet ./...
        working-directory: backend

      - name: Vet agent
        run: go vet ./...
        working-directory: agent

      - name: Build backend
        run: go build ./...
        working-directory: backend

      - name: Build agent
        run: go build ./...
        working-directory: agent

      - name: Lint backend
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m

      - name: Lint agent
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: agent
          args: --timeout=5m

      - name: Test backend
        run: go test -race -coverprofile=coverage.out ./...
        working-directory: backend

      - name: Test agent
        run: go test -race -coverprofile=coverage.out ./...
        working-directory: agent

      - name: Vuln check backend
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
        working-directory: backend

      - name: Vuln check agent
        run: govulncheck ./...
        working-directory: agent

  panel-checks:
    name: Panel Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: panel/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: panel

      - name: Check
        run: npm run check
        working-directory: panel

      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: panel
